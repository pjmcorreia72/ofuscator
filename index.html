<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Ofuscação</title>
    <style>
        body{
            font-family:Arial;
            width:400px;
            margin:50px auto;
            text-align:center;
        }

        input{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        #resultado{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>Calculadora de IMC</h1>

<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="altura" placeholder="Altura (m)">

<button id="calcular">Calcular</button>

<div id="resultado"></div>

<script src="script_obfuscator.js"></script>

</body>
</html>
